function _stackCivs(arr){
  var ends=[], map=[];
  arr.forEach(function(c){
    var placed=false;
    for(var r=0;r<ends.length;r++){
      if(c.s >= ends[r]+8){ ends[r]=c.e; map.push(r); placed=true; break; }
    }
    if(!placed){ map.push(ends.length); ends.push(c.e); }
  });
  return { rows: Math.max(ends.length,arr.length?1:0), map: map };
}

  var bounds = [[13.8e9,4.6e9],[4.6e9,2.5e9],[2.5e9,542e6],[542e6,251e6],[251e6,65e6],[65e6,3e6],[3e6,50000],[50000,6114]];
  for (var i = 0; i < WCOMP.length; i++) {
    var s = bounds[i][0], e = bounds[i][1], cp = compRanges[i];
    if (ago <= s && ago >= e) { return cp.x + ((s - ago) / (s - e)) * cp.w; }
  }
  return compTotalW;
}

/* Compressed-zone agoToX for main chart (maps deep-time ago to x pixels in the left margin) */
var COMP_LEFT = 0;  /* compressed eras go to the left of AM 0 */
var compMainRanges = [];
(function(){
  var totalLog = 0;
  WCOMP.forEach(function(c){ totalLog += Math.log10(c.dur) * 5; });
  var compW = 306;
  var cx = -compW;
  WCOMP.forEach(function(c){
    var w = (Math.log10(c.dur) * 5 / totalLog) * compW;
    compMainRanges.push({ x: cx, w: w });
    cx += w;
  });
})();
function agoToMainX(ago) {
  var bounds = [[13.8e9,4.6e9],[4.6e9,2.5e9],[2.5e9,542e6],[542e6,251e6],[251e6,65e6],[65e6,3e6],[3e6,50000],[50000,6114]];
  for (var i = 0; i < WCOMP.length; i++) {
    var s = bounds[i][0], e = bounds[i][1], cp = compMainRanges[i];
    if (ago <= s && ago >= e) { return cp.x + ((s - ago) / (s - e)) * cp.w; }
  }
  return 0;
}
var MAIN_LEFT = compMainRanges[0].x;  /* leftmost x (negative) */
var FULL_W = CHART_W - MAIN_LEFT;     /* total width including compressed */

/* Layer visibility */
var layerVis = { events: true, hfPre: true, bible: true, pjf: true, hfPost: true, organisms: true, wars: true, power: true };

/* ════════════════ D3 SETUP ════════════════ */
var container = d3.select("#chart-container");
var svg = d3.select("#main-svg");
var gRoot = svg.append("g").attr("id","root");
var currentK = 1, currentTx = 0, currentTy = 0;

var zoomBehavior = d3.zoom().scaleExtent([0.05, 30]).on("zoom", function(ev) {
  var t = ev.transform;
  var cw = container.node().clientWidth, ch = container.node().clientHeight;
  var k = t.k;
  var minTx = cw - CHART_W * k, maxTx = -MAIN_LEFT * k;
  var minTy = ch - TOTAL_H * k, maxTy = 0;
  var tx = (minTx > maxTx) ? (minTx + maxTx) / 2 : Math.max(minTx, Math.min(maxTx, t.x));
  var ty = (minTy > maxTy) ? (minTy + maxTy) / 2 : Math.max(minTy, Math.min(maxTy, t.y));
  if (tx !== t.x || ty !== t.y) {
    var clamped = d3.zoomIdentity.translate(tx, ty).scale(k);
    svg.node().__zoom = clamped;
    gRoot.attr("transform", clamped);
  } else {
    gRoot.attr("transform", t);
  }
  currentK = k; currentTx = tx; currentTy = ty;
  smartCull();
  updateMinimap();
  d3.select("#zoom-level").text(Math.round(k * 100) + "%");
});
svg.call(zoomBehavior);

function fitView() {
  var cw = container.node().clientWidth, ch = container.node().clientHeight;
  var scale = cw / FULL_W;
  var tx = -MAIN_LEFT * scale;
  var ty = (ch - TOTAL_H * scale) / 2;
  if (ty > 0) ty = 0;
  zoomBehavior.scaleExtent([scale, 30]);
  svg.transition().duration(600).call(zoomBehavior.transform, d3.zoomIdentity.translate(tx, ty).scale(scale));
}

/* ════════════════ RENDER ════════════════ */
function renderAll() {
  gRoot.selectAll("*").remove();

  /* White background */
  gRoot.append("rect").attr("x", MAIN_LEFT).attr("width", FULL_W).attr("height", TOTAL_H).attr("fill","#fff");

  /* Grid lines */
  for (var yr = 0; yr <= TOTAL_AM; yr += 200) {
    var gx = xS(yr);
    gRoot.append("line").attr("x1",gx).attr("y1",ERA_H).attr("x2",gx).attr("y2",TOTAL_H).attr("class","grid-line");
  }

  drawEraBar();
  if (layerVis.events) drawEvents();
  drawDates();
  drawCompressedEraBgs();
  if (layerVis.bible) drawBibleEraBgs();
  if (layerVis.organisms) drawOrganisms();
  if (layerVis.hfPre) drawHFPre();
  if (layerVis.bible) drawBible();
  if (layerVis.hfPost) drawHFPost();
  /* PJF rendered LAST among biblical/HF layers so its bars sit on top of any overlap */
  if (layerVis.pjf) drawPJF();
  if (layerVis.power) drawPower();
  if (layerVis.wars) drawWars();

  smartCull();
}

/* ── Era bar ── */

    eg.append("text").attr("x",cp.x+2).attr("y",8).attr("fill",era.tc).attr("font-size",5).attr("font-weight",700).attr("class","comp-era-label").text(era.n);

/* ── Events (major + sub) in dedicated bands ── */
function drawEvents() {
  var gEv = gRoot.append("g").attr("class","layer-events");

  /* Major events: biblical first (priority rows 0-1), then histography */
  var bibMaj = [], histMaj = [];
  MEV.forEach(function(ev,i){ bibMaj.push({src:"b",i:i,am:ev.am,n:ev.n,detail:ev.detail}); });
  HEV.forEach(function(ev,i){
    var nm = ev.n.length > 28 ? ev.n.substring(0,25)+"..." : ev.n;
    histMaj.push({src:"h",i:i,am:ev.am,n:nm,detail:ev.cat});
  });
  bibMaj.sort(function(a,b){return a.am-b.am;});
  histMaj.sort(function(a,b){return a.am-b.am;});

  var majRowEnds = [];
  /* Stack biblical events first so they always claim the lowest rows */
  bibMaj.forEach(function(m) {
    var px = xS(m.am), textW = m.n.length * 3.5 + 8;
    var bestRow = 0;
    for (var r = 0; r < majRowEnds.length; r++) { if (px >= majRowEnds[r] + 8) { bestRow = r; break; } bestRow = r + 1; }
    if (bestRow >= majRowEnds.length) majRowEnds.push(0);
    majRowEnds[bestRow] = px + textW;
    m.row = bestRow; m.px = px;
  });
  histMaj.forEach(function(m) {
    var px = xS(m.am), textW = m.n.length * 3.5 + 8;
    var bestRow = 0;
    for (var r = 0; r < majRowEnds.length; r++) { if (px >= majRowEnds[r] + 8) { bestRow = r; break; } bestRow = r + 1; }
    if (bestRow >= majRowEnds.length) majRowEnds.push(0);
    majRowEnds[bestRow] = px + textW;
    m.row = bestRow; m.px = px;
  });
  var allMaj = bibMaj.concat(histMaj);

  allMaj.forEach(function(m) {
    var isBib = m.src === "b";
    var ly = MAJ_BAND_Y + m.row * 6;
    if (ly > MAJ_BAND_Y + MAJ_BAND_H - 6) return;
    var col = PAL_EV_MAJ;
    var dAttr = isBib ? "mev" : "hev";

    /* Vertical dashed line */
    gEv.append("line").attr("x1",m.px).attr("y1",ERA_H+2).attr("x2",m.px).attr("y2",TOTAL_H)
      .attr("class","ev-dashed").attr("stroke",col).attr("stroke-width",isBib?1.5:1).attr("opacity",isBib?0.2:0.12);

    /* Hitbox */
    var hg = gEv.append("g").attr("class","bar-hov").attr("data-type",dAttr).attr("data-idx",m.i);
    hg.append("rect").attr("x",m.px-5).attr("y",ERA_H).attr("width",11).attr("height",TOTAL_H-ERA_H).attr("fill","transparent");

    /* Label */
    hg.append("text").attr("x",m.px+2).attr("y",ly+5).attr("fill",col).attr("font-size",5).attr("font-weight",700)
      .style("text-transform","uppercase").attr("class","maj-label").text(m.n);
  });

  /* Pre-Bronze Age major events in compressed zone */
  var pbmRowEnds = [];
  PBM.forEach(function(ev, i) {
    var px = agoToMainX(ev.ago), textW = ev.n.length * 3.5 + 6;
    var bestRow = 0;
    for (var r = 0; r < pbmRowEnds.length; r++) { if (px >= pbmRowEnds[r] + 6) { bestRow = r; break; } bestRow = r + 1; }
    if (bestRow >= pbmRowEnds.length) pbmRowEnds.push(0);
    pbmRowEnds[bestRow] = px + textW;
    var ly = MAJ_BAND_Y + bestRow * 6;

    gEv.append("line").attr("x1",px).attr("y1",ERA_H+1).attr("x2",px).attr("y2",TOTAL_H)
      .attr("class","ev-dashed").attr("stroke",PAL_EV_MAJ).attr("stroke-width",1).attr("opacity",0.15);
    var pg = gEv.append("g").attr("class","bar-hov").attr("data-type","pbm").attr("data-idx",i);
    pg.append("rect").attr("x",px-3).attr("y",ERA_H).attr("width",7).attr("height",TOTAL_H-ERA_H).attr("fill","transparent");
    pg.append("text").attr("x",px+2).attr("y",ly+5).attr("fill",PAL_EV_MAJ).attr("font-size",4.5).attr("font-weight",700)
      .style("text-transform","uppercase").attr("class","pbm-label").text(ev.n);
  });

  /* Sub events (biblical) in SUB_BAND */
  var subSorted = SEV.map(function(s,i){return{i:i,am:s.am,n:s.n};}).sort(function(a,b){return a.am-b.am;});
  var subRowEnds = [];
  subSorted.forEach(function(s) {
    var px = xS(s.am), textW = s.n.length * 3 + 6;
    var bestRow = 0;
    for (var r = 0; r < subRowEnds.length; r++) { if (px >= subRowEnds[r] + 6) { bestRow = r; break; } bestRow = r + 1; }
    if (bestRow >= subRowEnds.length) subRowEnds.push(0);
    subRowEnds[bestRow] = px + textW;
    s.row = bestRow; s.px = px;
  });
  subSorted.forEach(function(s) {
    var ly = SUB_BAND_Y + s.row * 5;
    if (ly > SUB_BAND_Y + SUB_BAND_H - 5) return;
    gEv.append("line").attr("x1",s.px).attr("y1",ERA_H+2).attr("x2",s.px).attr("y2",TOTAL_H)
      .attr("class","ev-dashed").attr("stroke",PAL_EV_SUB).attr("stroke-width",1).attr("opacity",0.12);
    var sg = gEv.append("g").attr("class","bar-hov").attr("data-type","sev").attr("data-idx",s.i);
    sg.append("rect").attr("x",s.px-4).attr("y",ERA_H).attr("width",9).attr("height",TOTAL_H-ERA_H).attr("fill","transparent");
    sg.append("text").attr("x",s.px+2).attr("y",ly+4).attr("fill",PAL_EV_SUB).attr("font-size",4.5).attr("font-weight",600)
      .attr("class","sub-label").text(s.n);
  });

  /* Row labels */
  gEv.append("text").attr("x",MAIN_LEFT+2).attr("y",MAJ_BAND_Y+6).attr("fill",PAL_EV_MAJ).attr("font-size",5).attr("font-weight",700)
    .style("text-transform","uppercase").text("Major Events");
  gEv.append("text").attr("x",MAIN_LEFT+2).attr("y",SUB_BAND_Y+5).attr("fill",PAL_EV_SUB).attr("font-size",5).attr("font-weight",700)
    .style("text-transform","uppercase").text("Sub Events");
}

        .attr("class","hf-label").style("pointer-events","none").text(f.n);

/* ── Biblical Genealogy (THE SPINE) ── */
function drawBible() {
  var g = gRoot.append("g").attr("class","layer-bible");
  var prevSx = -999;
  var barH = 6;  /* compact bar height */
  P.forEach(function(p, i) {
    var ps = pos[i];
    var top = BIBLE_TOP + i * BIBLE_ROW, barT = top + 2;

    /* Color logic from original */
    var curC = "#b45309";
    if (i < 10) curC = "#b45309"; else if (i < 18) curC = "#0369a1"; else if (i < 22) curC = "#7c3aed"; else if (p.sc) curC = p.sc || "#b45309";
    var cl = p.fin ? PAL_BIB_BAR : (p.king ? "#7c3aed" : curC);
    var op = p.tk ? 0.4 : (p.l ? 0.8 : 0.35);

    var hDist = ps.sx - prevSx; prevSx = ps.sx;

    /* Section label — above the bar so it doesn't collide with the person name */
    if (p.sec) g.append("text").attr("x",ps.sx).attr("y",barT-2).attr("text-anchor","start")
      .attr("fill",cl).attr("font-size",3.5).attr("font-weight",700).attr("opacity",0.85).style("text-transform","uppercase").attr("class","sec-label").text(p.sec);

    /* Name */
    var ng = g.append("g").attr("class","bar-hov").attr("data-type","person").attr("data-idx",i);
    ng.append("text").attr("x",ps.sx - 3).attr("y",barT+5).attr("text-anchor","end")
      .attr("fill",cl).attr("font-size",5.5).attr("font-weight",700).attr("class","person-name")
      .text(p.n + (p.king ? " \u{1F451}" : ""));

    /* Lifespan bar — always drawn; dashed outline if no lifespan data */
    if (p.l) {
      ng.append("rect").attr("x",ps.sx).attr("y",barT).attr("width",ps.bw).attr("height",barH)
        .attr("fill",cl).attr("opacity",op).attr("rx",3);
      if (ps.bw > 50)
        g.append("text").attr("x",ps.sx+2).attr("y",barT+5).attr("fill","#fff").attr("font-size",4).attr("font-weight",600).attr("class","life-label").text(p.l+" yrs");
      else
        g.append("text").attr("x",ps.sx+ps.bw+2).attr("y",barT+5).attr("fill",cl).attr("font-size",4).attr("font-weight",500).attr("class","life-label").text(p.l+" yrs");
    } else {
      ng.append("rect").attr("x",ps.sx).attr("y",barT).attr("width",ps.bw).attr("height",barH)
        .attr("fill","none").attr("stroke",cl).attr("stroke-width",0.8).attr("stroke-dasharray","2,1.5").attr("opacity",0.5).attr("rx",3);
      g.append("text").attr("x",ps.sx+ps.bw+2).attr("y",barT+5).attr("fill","#94a3b8").attr("font-size",4).attr("class","life-label").text("no data");
    }

    /* BC date */
    var bc = C - p.b, bcStr = bc > 0 ? bc+" BC" : Math.abs(bc)+" AD";
    if (hDist > 14)
      g.append("text").attr("x",ps.sx).attr("y",barT+barH+4).attr("fill","#B91C1C").attr("font-size",3.4).attr("font-weight",500).attr("class","bc-date").text(bcStr);

    /* Begat dot + connector */
    if (ps.bx != null && i < P.length - 1) {
      ng.append("circle").attr("cx",ps.bx).attr("cy",barT+3.5).attr("r",1.6).attr("fill","#EF4444").attr("stroke","#fff").attr("stroke-width",0.6);
      if (p.a >= 15 || hDist > 18)
        g.append("text").attr("x",ps.bx).attr("y",barT-1).attr("text-anchor","middle")
          .attr("fill","#EF4444").attr("font-size",3.8).attr("font-weight",600).attr("class","begat-label").text("age "+p.a);
      /* Connector line + arrow */
      var nextBarT = BIBLE_TOP + (i+1) * BIBLE_ROW + 2;
      g.append("line").attr("x1",ps.bx).attr("y1",barT+barH).attr("x2",ps.bx).attr("y2",nextBarT)
        .attr("stroke","#EF4444").attr("stroke-width",1).attr("opacity",0.35);
      g.append("polygon").attr("points",(ps.bx-2)+","+(nextBarT-2)+" "+(ps.bx+2)+","+(nextBarT-2)+" "+ps.bx+","+nextBarT)
        .attr("fill","#EF4444").attr("opacity",0.4);
    }
  });
}

/* ── Post-Jesus Biblical Figures — cascades UP from Jesus' row (mirror of Adam→Jesus spine) ── */
function drawPJF() {
  var g = gRoot.append("g").attr("class","layer-pjf");
  /* Group section labels keyed by the first row of each group */
  var groupNames = {Apostle:"Apostles & First Witnesses", EarlyChurch:"Early Church Fathers", Forerunner:"Pre-Reformation", Reformer:"Reformers", Founder:"Denomination Founders"};
  var seenGrp = {};

  PJF.forEach(function(f, idx) {
    var fy = JESUS_ROW_TOP - (idx + 1) * PJF_ROW_H;
    /* Stop when cascade would touch the existing historical-figures band */
    if (fy < BIBLE_TOP + 4) return;

    var barT = fy + 2, barH = 6;
    var fx = xS(f.b), fw = f.l ? Math.max(xS(f.b + f.l) - fx, 10) : 16;
    var cc = PJF_COL[f.grp] || "#b45309";

    /* Section header above the first row of each group */
    if (!seenGrp[f.grp]) {
      seenGrp[f.grp] = true;
      g.append("text").attr("x", fx).attr("y", barT-2).attr("text-anchor","start")
        .attr("fill", cc).attr("font-size", 3.5).attr("font-weight", 700).attr("opacity", 0.85)
        .style("text-transform","uppercase").attr("class","pjf-sec").text(groupNames[f.grp] || f.grp);
    }

    /* Name label to the LEFT of bar — mirrors biblical genealogy person-name placement */
    var ng = g.append("g").attr("class","bar-hov").attr("data-type","pjf").attr("data-idx", idx);
    ng.append("text").attr("x", fx - 3).attr("y", barT+5).attr("text-anchor","end")
      .attr("fill", cc).attr("font-size", 5.5).attr("font-weight", 700)
      .attr("class","pjf-name").text(f.n);

    /* Lifespan bar (same shape & opacity as biblical lifespan) */
    ng.append("rect").attr("x", fx).attr("y", barT).attr("width", fw).attr("height", barH)
      .attr("fill", cc).attr("opacity", 0.8).attr("rx", 3);

    /* Lifespan years label — inside bar if it fits, else after */
    if (fw > 50)
      g.append("text").attr("x", fx+2).attr("y", barT+5).attr("fill","#fff").attr("font-size",4).attr("font-weight",600).attr("class","pjf-life").text(f.l+" yrs");
    else
      g.append("text").attr("x", fx+fw+2).attr("y", barT+5).attr("fill", cc).attr("font-size",4).attr("font-weight",500).attr("class","pjf-life").text(f.l+" yrs");

    /* AD/BC date under bar */
    var ad = f.b - C, dStr = ad >= 0 ? ad+" AD" : Math.abs(ad)+" BC";
    g.append("text").attr("x", fx).attr("y", barT+barH+4).attr("fill", "#7C2D12").attr("font-size",3.4).attr("font-weight",500).attr("class","pjf-date").text(dStr);
  });
}

/* ── Post-Jesus Historical Figures (sharing biblical band) ── */
function drawHFPost() {
  var g = gRoot.append("g").attr("class","layer-hfpost");
  for (var k = 0; k < hfPost.length; k++) {

function drawWars() {
  var g = gRoot.append("g").attr("class","layer-wars");

  for (var ci = 0; ci < 7; ci++) {
    var ccy = contYArr[ci];
    g.append("text").attr("x",MAIN_LEFT+2).attr("y",ccy-1).attr("fill",WAR_COL[ci]).attr("font-size",5).attr("font-weight",700)
      .style("text-transform","uppercase").attr("class","cont-label").text(CONT_NAMES[ci]);
    g.append("rect").attr("x",0).attr("y",ccy).attr("width",CHART_W).attr("height",contHArr[ci]).attr("fill",WAR_COL[ci]).attr("opacity",0.03);
    if (ci < 6) g.append("line").attr("x1",MAIN_LEFT).attr("y1",ccy+contHArr[ci]+3).attr("x2",CHART_W).attr("y2",ccy+contHArr[ci]+3)
      .attr("stroke","#e5e5e5").attr("stroke-width",0.5);
    /* Civilization sub-rows at the TOP of this continent's band */
    if (contCivH[ci] > 0) {
      var civs = CIVS[ci], stack = civStacks[ci];
      civs.forEach(function(c, idx) {
        var row = stack.map[idx];
        var cx1 = xS(c.s), cx2 = xS(c.e), cw = Math.max(cx2 - cx1, 3);
        var cby = ccy + row * CIV_ROW_H;
        var cg = g.append("g").attr("class","bar-hov").attr("data-type","civ").attr("data-cci",ci).attr("data-idx",idx);
        cg.append("rect").attr("x",cx1).attr("y",cby).attr("width",cw).attr("height",CIV_ROW_H-1).attr("fill",c.c).attr("opacity",0.55).attr("rx",2).attr("stroke",c.c).attr("stroke-width",0.3).attr("stroke-opacity",0.8);
        if (cw > c.n.length * 2.4)
          cg.append("text").attr("x",cx1+1).attr("y",cby+CIV_ROW_H-1.8).attr("fill","#fff").attr("font-size",3.5).attr("font-weight",600)
            .style("pointer-events","none").text(c.n);
      });
      /* Subtle divider between civ band and war rows */
      g.append("line").attr("x1",MAIN_LEFT).attr("y1",ccy+contCivH[ci]-1).attr("x2",CHART_W).attr("y2",ccy+contCivH[ci]-1)
        .attr("stroke",WAR_COL[ci]).attr("stroke-width",0.4).attr("opacity",0.35);
    }
  }

  WARS.forEach(function(war, wi) {
    var ci = war[0], name = war[1], sAM = war[2], eAM = war[3], imp = war[4], row = war[5];
    var x1 = xS(sAM), x2 = xS(eAM), bw = Math.max(x2 - x1, 3);
    var by = contYArr[ci] + contCivH[ci] + row * WAR_ROW_H;
    var op = imp >= 5 ? 0.85 : (imp >= 4 ? 0.6 : 0.4);
    var wg = g.append("g").attr("class","bar-hov").attr("data-type","war").attr("data-idx",wi);
    wg.append("rect").attr("x",x1).attr("y",by).attr("width",bw).attr("height",WAR_BAR_H).attr("fill",WAR_COL[ci]).attr("opacity",op).attr("rx",2);
    var durYrs = eAM - sAM, isWW = name.indexOf("World War") >= 0, is100 = durYrs >= 100;
    if (is100 || imp >= 5) {
      var nameLen = name.length * 3.2 + 2;
      if (bw >= nameLen || isWW || is100)
        wg.append("text").attr("x",x1+1).attr("y",by+WAR_BAR_H-1).attr("fill","#fff").attr("font-size",4).attr("font-weight",600)
          .attr("class","war-label").style("pointer-events","none").text(name);
    }
  });
}

var mmSvg = d3.select("#minimap"), mmVP, mmScale;

  mmSvg.attr("width", cw).attr("height", 28);

    mmSvg.append("rect").attr("x", mmScale(xS(era.s))).attr("y",2)
      .attr("width", mmScale(xS(era.e)) - mmScale(xS(era.s))).attr("height",24).attr("fill",era.c).attr("opacity",0.7).attr("rx",2);
  });
  MEV.forEach(function(ev) { mmSvg.append("line").attr("x1",mmScale(xS(ev.am))).attr("y1",0).attr("x2",mmScale(xS(ev.am))).attr("y2",28).attr("stroke","#dc2626").attr("stroke-width",0.5).attr("opacity",0.3); });
  mmVP = mmSvg.append("rect").attr("class","viewport-rect").attr("y",1).attr("height",26);
  mmSvg.on("click", function(ev) {

    var chartX = mmScale.invert(mx);
    var cw2 = container.node().clientWidth;

function updateMinimap() {

  var ml = mmScale(Math.max(MAIN_LEFT, visL)), mr = mmScale(Math.min(CHART_W, visR));
  mmVP.attr("x", ml).attr("width", Math.max(mr - ml, 4));
}

var tip = d3.select("#tip");
svg.on("mousemove", function(ev) {
  var el = ev.target;
  while (el && el.tagName !== "svg" && !el.getAttribute("data-type")) el = el.parentElement;
  if (!el || !el.getAttribute("data-type")) { tip.style("display","none"); return; }
  var type = el.getAttribute("data-type"), idx = +el.getAttribute("data-idx"), s = "";

  if (type === "person") {
    var p = P[idx], bc = C-p.b;
    s = '<div class="tip-title">'+p.n+(p.king?" \u{1F451}":"")+(p.fin?" \u2726":"")+'</div>';
    s += '<div><span class="tip-label">Born:</span> <span class="tip-val">'+bc+' BC</span> (AM '+p.b+')</div>';
    if (p.l) { var d=bc-p.l; s+='<div><span class="tip-label">Died:</span> <span class="tip-val">'+(d>0?d+" BC":Math.abs(d)+" AD")+'</span></div>'; s+='<div><span class="tip-label">Lifespan:</span> <span class="tip-val2">'+p.l+' years</span></div>'; }
    if (p.a!=null&&idx<P.length-1) s+='<div>Begat <span class="tip-val">'+P[idx+1].n+'</span> at age <b>'+p.a+'</b></div>';
    if (p.ref) s+='<div class="tip-detail">'+p.ref+'</div>';
  } else if (type === "hf") {
    var f = HF[idx], bc2 = C-f.b;
    s = '<div class="tip-title">'+f.n+'</div>';
    s += '<div><span class="tip-label">Born:</span> <span class="tip-val">'+(bc2>0?bc2+" BC":Math.abs(bc2)+" AD")+'</span></div>';
    if (f.l) s+='<div><span class="tip-label">Lifespan:</span> <span class="tip-val2">'+f.l+' years</span></div>';
    s+='<div><span class="tip-label">Category:</span> '+f.cat+'</div>';

    if (pj.detail) s += '<div class="tip-detail">'+pj.detail+'</div>';
  } else if (type === "war") {
    var w = WARS[idx], bs = C-w[2], be = C-w[3];
    s = '<div class="tip-title">'+w[1]+'</div>';
    s+='<div><span class="tip-label">Period:</span> <span class="tip-val">'+(bs>0?bs+" BC":Math.abs(bs)+" AD")+' \u2014 '+(be>0?be+" BC":Math.abs(be)+" AD")+'</span></div>';

    if (me.detail) s+='<div class="tip-detail">'+me.detail+'</div>';
  } else if (type === "hev") {

  [
    ["#b45309","Biblical lifespan"],["#EF4444","Begat connector"],
    ["#DC2626","Major event (dashed)"],["#6366f1","Sub-event (dashed)"],
    ["#1e40af","HF: Political"],["#0369a1","HF: Science"],["#7c3aed","HF: Arts"],
    ["#b91c1c","HF: Military"],["#b45309","HF: Religious"],["#047857","HF: Explorer"]
  ].forEach(function(pair) {
    lg.html(lg.html()+'<div class="leg-row"><span class="leg-sw" style="background:'+pair[0]+'"></span><span>'+pair[1]+'</span></div>');
  });
}

/* ════════════════ ZOOM BUTTONS ════════════════ */
d3.select("#zin").on("click", function(){ svg.transition().duration(300).call(zoomBehavior.scaleBy, 1.5); });
d3.select("#zout").on("click", function(){ svg.transition().duration(300).call(zoomBehavior.scaleBy, 0.67); });
d3.select("#zfit").on("click", fitView);

/* ════════════════ STATS ════════════════ */
d3.select("#stats-text").text(P.length+" generations | "+HF.length+" historical figures | "+PJF.length+" post-Jesus biblical | "+(HEV.length+MEV.length+PBM.length)+" events | "+WARS.length+" wars | "+ORGS.length+" life forms");

/* ════════════════ INIT ════════════════ */
function init() {
  var cw = container.node().clientWidth, ch = container.node().clientHeight;
  svg.attr("width",cw).attr("height",ch);
  initEraNav(); initToggles(); initMinimap(); initLegend();
  renderAll();
  setTimeout(fitView, 150);
}
window.addEventListener("resize", function(){
  var cw = container.node().clientWidth, ch = container.node().clientHeight;
  svg.attr("width",cw).attr("height",ch); initMinimap();
});
init();

})();
</script>
</body>
